name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# 防止兩次部署同時跑（第二次觸發會排隊等第一次結束）— a burst of merges to
# main queues up their deploy runs one after another rather than overlapping.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    # workflow_run fires for CI on every branch/PR it runs against, not just
    # main, and fires regardless of whether CI passed — gate on both so a
    # failing or non-main CI run never triggers a deploy. workflow_dispatch
    # has no workflow_run event to check, so it's let through unconditionally
    # as the manual "force deploy now" escape hatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # cache: false — setup-go's default (true) round-trips the module/build
      # cache through GitHub's network-backed Actions cache, which only pays
      # off on an ephemeral hosted runner (see ci.yml, where the default is
      # left on). This runner is the VPS itself, persistent across jobs, so
      # $GOMODCACHE/$GOCACHE already sit on local disk between deploys for
      # free — the network round-trip here would be pure overhead.
      # No setup-node here: this self-hosted runner is the VPS itself,
      # which scripts/vps/provision.sh already provisions with Node.js —
      # same reasoning as skipping setup-go's cache above, an ephemeral
      # hosted runner's bootstrap step is this runner's permanent state.
      - name: Build frontend
        run: npm ci && npm run build
        working-directory: web

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        run: go build -o argus.new ./cmd/bot

      - name: Install binary
        run: |
          mkdir -p "$HOME/apps/argus"
          # mv 是原子的 rename，即使舊 binary 正在執行也不會遇到 "text file busy"
          mv -f argus.new "$HOME/apps/argus/argus"

      - name: Restart service
        run: |
          # runner 以服務身分跑時沒有 login session 環境，
          # 需要手動指向 user bus 才能用 systemctl --user
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user restart argus

      - name: Verify
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          sleep 3
          systemctl --user is-active argus
          journalctl --user -u argus -n 20 --no-pager || true
