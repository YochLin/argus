name: Deploy

on:
  workflow_dispatch:
  schedule:
    # 18:00 CST daily (cron is UTC) — batches whatever's merged to main since
    # the last deploy into one restart instead of deploying on every merge.
    # Picked as the point in the day farthest from every scheduler.go cron
    # job (23:30 daily report; 05:30/05:45/06:00 closing snapshot/universe
    # scan/backup), so a restart never lands mid-job.
    - cron: "0 10 * * *"

# 防止兩次部署同時跑（第二次觸發會排隊等第一次結束）
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # Scheduled runs skip the rest of the job when main hasn't moved since
      # the last successful deploy — a same-commit restart has no code
      # change to show for it, but does still kill the bot's persistent LLM
      # chat session (see internal/llm's Client.Close note) and any
      # in-flight job. A manual workflow_dispatch always deploys regardless
      # (this step only runs for schedule), so it still works as a "force
      # deploy now" escape hatch.
      - name: Skip if nothing new to deploy
        if: github.event_name == 'schedule'
        id: check
        run: |
          MARKER="$HOME/apps/argus/.deployed_sha"
          CURRENT="$(git rev-parse HEAD)"
          if [ -f "$MARKER" ] && [ "$(cat "$MARKER")" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # cache: false — setup-go's default (true) round-trips the module/build
      # cache through GitHub's network-backed Actions cache, which only pays
      # off on an ephemeral hosted runner (see ci.yml, where the default is
      # left on). This runner is the VPS itself, persistent across jobs, so
      # $GOMODCACHE/$GOCACHE already sit on local disk between deploys for
      # free — the network round-trip here would be pure overhead.
      - uses: actions/setup-go@v5
        if: steps.check.outputs.skip != 'true'
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: go build -o argus.new ./cmd/bot

      - name: Install binary
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p "$HOME/apps/argus"
          # mv 是原子的 rename，即使舊 binary 正在執行也不會遇到 "text file busy"
          mv -f argus.new "$HOME/apps/argus/argus"

      - name: Restart service
        if: steps.check.outputs.skip != 'true'
        run: |
          # runner 以服務身分跑時沒有 login session 環境，
          # 需要手動指向 user bus 才能用 systemctl --user
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user restart argus

      - name: Verify
        if: steps.check.outputs.skip != 'true'
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          sleep 3
          systemctl --user is-active argus
          journalctl --user -u argus -n 20 --no-pager || true

      # Only recorded once Verify above has actually confirmed the new
      # binary is up — a failed deploy leaves the marker stale on purpose,
      # so the next scheduled run retries the same commit instead of
      # silently giving up on it.
      - name: Record deployed commit
        if: steps.check.outputs.skip != 'true'
        run: git rev-parse HEAD > "$HOME/apps/argus/.deployed_sha"
